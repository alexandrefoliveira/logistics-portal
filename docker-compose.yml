version: '3.8'

services:
   frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

   backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=logistics.IceRiver@2026!
      - DB_NAME=logistics_portal
      - TZ=America/Toronto
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads 
   db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=logistics.IceRiver@2026!
      - MYSQL_DATABASE=logistics_portal
      - TZ=America/Toronto
    volumes:
      - db_data:/var/lib/mysql 

volumes:
  db_data: